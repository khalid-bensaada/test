<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Love Animation</title>

    <style>
        body {
            margin: 0;
            background: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #ui {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .love_word {
            position: absolute;
            color: #ea80b0;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            opacity: 0.9;
            animation: pulse 2s infinite ease-in-out;
            animation-delay: calc(var(--i) * 0.05s);
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
        }

      
        #ui {
            animation: rotateHeart 6s infinite alternate ease-in-out;
        }

        @keyframes rotateHeart {
            0% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(15deg);
            }
        }
    </style>
</head>

<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById("ui");


        let points = 180; 
        for (let i = 0; i < points; i++) {
            let t = (Math.PI * 2 * i) / points;

            let x = 16 * Math.pow(Math.sin(t), 3);
            let y =
                13 * Math.cos(t) -
                5 * Math.cos(2 * t) -
                2 * Math.cos(3 * t) -
                Math.cos(4 * t);

            
            let posX = 250 + x * 12;
            let posY = 250 - y * 12;

            const span = document.createElement("span");
            span.className = "love_word";
            span.style.left = posX + "px";
            span.style.top = posY + "px";
            span.style.setProperty("--i", i);

            span.innerText = "I love you";

            ui.appendChild(span);
        }
    </script>

</body>

</html>
